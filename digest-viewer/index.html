<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>技术周报归档</title>
    <script>
      (function () {
        try {
          var p = localStorage.getItem("digest-viewer-theme");
          var light =
            p === "light" ||
            (p !== "dark" && window.matchMedia("(prefers-color-scheme: light)").matches);
          document.documentElement.dataset.theme = light ? "light" : "dark";
          if (p) document.documentElement.dataset.themePref = p;
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-web@1.7.0/style.css"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
