# 周报订阅配置。环境变量 DIGEST_CONFIG 可指向其它 YAML 文件。
# 全局 keywords：各信息源未单独配置时使用。
keywords: "AI, LLM, Computer Vision"

# Arxiv：可选 keywords，不填则用全局 keywords
# backend: 仅决定「先试哪一路」；另一路（api↔library）自动备用，网络/解析失败会切换并打日志
arxiv:
  enabled: true
  backend: api
  keywords: "uav, llm"
  max_results: 8
  sort_by: submittedDate
  sort_order: descending
  # library_delay_seconds: 3.0
  # library_page_size: 100
  # library_num_retries: 3

# RSS：rss.keywords 作为「未单独设 keywords 的订阅」的默认；每条 feed 可再覆盖
rss:
  max_items: 8
  # keywords: "LLM, agent"
  feeds:
    - https://hnrss.org/frontpage
    - https://feeds.feedburner.com/TechCrunch/
    - url: https://www.reddit.com/r/MachineLearning/.rss
      # keywords: "仅该源使用，不填则先用 rss.keywords 再用全局"
    - https://www.reddit.com/r/LocalLLaMA/.rss

# GitHub Trending：可选 keywords，供周报叙述时侧重（抓取仍为完整榜单）；不填则用全局
# api_enrich: 解析榜单后再调 api.github.com 补全 Star/Fork/主语言（可设 false 跳过）
# 可选环境变量 GITHUB_TOKEN 或 GH_TOKEN 提高 API 速率
github_trending:
  enabled: true
  # keywords: "python, rust"
  url: "https://github.com/trending?since=weekly"
  max_repos: 8
  request_timeout: 60
  user_agent: "Mozilla/5.0 (compatible; GitHubDigestBot/1.0)"
  api_enrich: true
  api_timeout: 20
