# 周报订阅配置。环境变量 DIGEST_CONFIG 可指向其它 YAML 文件。
#
# 配置优先级（默认以本文件为准）：
#   - 关键词、时间窗、各信息源、AI 模型 → digest_config.yaml
#   - 环境变量 / GitHub Secrets 仅用于：API 密钥、CI 开关、临时覆盖（见 .env.example）
#
# 全局 keywords：各信息源未单独写 keywords 时使用。布尔式（Arxiv / RSS / GitHub 一致）：
#   扁平：逗号与 | 均为或（OR）；& 为与（AND）；&a,b 行首仍为与分项；a&b,c 为 a AND (b OR c)
#   富语法（出现括号或英文 and/or/andnot 单词）：与 arXiv 官方 AND/OR/ANDNOT 一致；逗号同 OR
#   例 (uav|aerial) & (vlm|llm|mllm) & (rl) 与 (uav OR aerial) AND (vlm OR llm OR mllm) AND (rl) 等价
#   全角 ｜ ＆ 等同 | &
keywords: "(uav|aerial) & (vlm|llm|mllm) & (rl)"

# AI 汇总（model / max_tokens 在此配置；API Key 与 Base URL 仅环境变量或 GitHub Secrets）
ai:
  model: MiniMax/MiniMax-M2.7:MiniMax
  max_tokens: 4000

# 根 date_range：默认窗口；各信息源可再写自己的 date_range 覆盖
# preset：相对「执行当日」— day=前一自然日，week=前 7 天（截止昨日），month=前一自然月
# start+end 与 preset 同时存在时以 start/end 为准
# 临时覆盖（可选）：DIGEST_DATE_START + DIGEST_DATE_END；DIGEST_DATE_PRESET
date_range:
  preset: week
  # start: "2026-03-01"
  # end: "2026-03-31"

# 周报正文表格：各板块需含「标签」列（由 AI 据标题+说明归纳）；Arxiv 另需「发表时间」「学科类别」（抓取已带日期与 cs.* 分类）
# Arxiv：整块共用一个 date_range（可选）；不写则用根 date_range
# 可选 keywords，不填则用全局 keywords（语法同文件头「布尔式」）
# - 字符串：如 "uav, llm"（同 uav|llm，逗号为 OR）、"uav&llm"（与）、"&uav,llm"（行首与分项）
# - 富布尔：如 "(uav|aerial) & (vlm|llm|mllm) & (rl)" → arXiv 段 (uav OR aerial) AND (vlm OR llm OR mllm) AND (rl)
# - 列表：每组单独检索，结果按组保留（跨组不去重）；如 [ "uav, llm", "ocr" ]
# max_results：每组最多条数（-1 表示单次请求按 arXiv 上限尽量多取）
# max_results_total（可选）：所有组加起来总条数上限，按组顺序截断（-1 表示不限制总数）
# backend: 仅决定「先试哪一路」；另一路（api↔library）自动备用，网络/解析失败会切换并打日志
arxiv:
  enabled: true
  backend: library
  # date_range:
  #   preset: month
  keywords: "(uav|aerial) & (vlm|llm|mllm) & (rl|reinforcement learning)"
  max_results: -1
  # max_results_total: 12
  sort_by: submittedDate
  sort_order: descending
  # library_delay_seconds: 3.0
  # library_page_size: 100
  # library_num_retries: 3

# Semantic Scholar：关键词布尔式同文件头；date_range 映射为 publicationDateOrYear
# API Key：环境变量 SEMANTIC_SCHOLAR_API_KEY（勿写入仓库）
semantic_scholar:
  enabled: true
  # keywords 不填则用全局 keywords；列表时每组单独检索
  max_results: 30
  # max_results_total: 24

# OpenAlex：关键词布尔式同文件头；date_range 映射为 from/to_publication_date
# API Key：环境变量 OPENALEX_API_KEY；可选 OPENALEX_MAILTO 或块内 mailto
openalex:
  enabled: true
  max_results: 30
  # max_results_total: 24

# RSS：keywords 布尔式用于标题匹配（同文件头）；rss.date_range 与每条 feed 的 date_range 过滤发布日
rss:
  max_items: 30
  # date_range:
  #   preset: week
  # keywords: "LLM, agent"
  feeds:
    - https://hnrss.org/frontpage
    - https://feeds.feedburner.com/TechCrunch/
    - url: https://www.reddit.com/r/MachineLearning/.rss
      # date_range: { preset: day }
      # keywords: "仅该源使用，不填则先用 rss.keywords 再用全局"
    - https://www.reddit.com/r/LocalLLaMA/.rss

# GitHub 周榜（github_trending）：第三方 Trending RSS，**只取榜单数据**、不对条目做关键词或本地过滤
# url / rss_base / since / language；date_range.preset 仅用于切换 RSS 的 daily/weekly/monthly 目录
# api_enrich：再调 api.github.com/repos 补 Star/Fork/语言
# 旧版 fetch_mode: search 已废弃，请改用下方 github_repository_search
github_trending:
  enabled: true
  url: "https://mshibanami.github.io/GitHubTrendingRSS/weekly/all.xml"
  max_repos: 30
  request_timeout: 60
  user_agent: "Mozilla/5.0 (compatible; GitHubDigestBot/1.0)"
  api_enrich: true
  api_timeout: 20

# GitHub 指定日期检索（github_repository_search）：官方 GET /search/repositories
# 在**全站公开仓库**内检索（不是周榜/日榜 Trending 榜单）；keywords 布尔式（无则用全局）
# 默认 q 追加 pushed:本块 date_range 起止（未写 date_range 则用根窗口），用于限定近期有推送的仓库
# search_sort：stars|forks|updated|help-wanted-issues；search_order：desc|asc
# search_restrict_pushed：false 可去掉 pushed 限定；search_query_extra 附加到 q
# language：非 all 时追加 language: 限定
# 建议配置 GITHUB_TOKEN / GH_TOKEN
github_repository_search:
  enabled: true
  # 独立于全局 keywords：uav + (rl 或 llm)
  keywords: "uav & (rl|llm)"
  max_repos: 30
  user_agent: "Mozilla/5.0 (compatible; GitHubDigestBot/1.0)"
  api_timeout: 20
  search_sort: stars
  search_order: desc
  search_restrict_pushed: true
