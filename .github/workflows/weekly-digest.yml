name: 📅 Weekly Tech Digest

# 流程：
# 1. 使用最新 master 源码运行抓取（Python + digest-viewer 构建脚本）
# 2. 从 gh-pages 恢复历史 data/，追加本次抓取结果
# 3. 构建前端，将 dist + data/ 一并发布到 gh-pages（Pages 展示 + JSON 归档）
# master 仅保留源码，不提交周报数据。
#
# 定时：每周五 UTC 12:00（北京时间周五 20:00），preset=week（前 7 天至昨日）。
# 历史周次回填：scripts/backfill_weekly_runs.py（仅写 data/，构建由 digest-site 负责）。

on:
  schedule:
    - cron: "0 12 * * 5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-digest-${{ github.repository }}
  cancel-in-progress: false

jobs:
  digest-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master (latest crawl code)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Sync master
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git pull --rebase origin "${{ github.event.repository.default_branch }}"

      - name: Restore digest archive from gh-pages
        run: bash .github/scripts/restore-data-from-gh-pages.sh

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Digest Generator
        env:
          DIGEST_NO_GIT: "1"
          # 密钥与通知：仅 Secrets / .env，业务配置见 digest_config.yaml
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python main.py

      - name: Set up Node
        if: success()
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: digest-viewer/package-lock.json

      - name: Build digest viewer
        if: success()
        working-directory: digest-viewer
        env:
          VITE_BASE: /find_everything/
          DIGEST_DEDUPE_LINK: ${{ vars.DIGEST_DEDUPE_LINK || '1' }}
          VITE_GA_MEASUREMENT_ID: ${{ vars.VITE_GA_MEASUREMENT_ID }}
          VITE_UMAMI_WEBSITE_ID: ${{ vars.VITE_UMAMI_WEBSITE_ID }}
          VITE_UMAMI_SCRIPT_URL: ${{ vars.VITE_UMAMI_SCRIPT_URL }}
          VITE_GOATCOUNTER_ENDPOINT: ${{ vars.VITE_GOATCOUNTER_ENDPOINT }}
        run: npm ci && npm run build

      - name: Prepare gh-pages bundle (site + data archive)
        if: success()
        run: bash .github/scripts/prepare-gh-pages-deploy.sh

      - name: Publish to gh-pages
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./deploy
          force_orphan: true
