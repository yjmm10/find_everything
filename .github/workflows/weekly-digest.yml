name: 📅 Weekly Tech Digest

# 说明：GITHUB_TOKEN 的 push 不会触发其它 workflow，故在同一 job 内完成 digest-viewer 构建与 Pages 发布。

on:
  schedule:
    # 每周五 12:00 UTC 执行（对应北京时间 20:00）
    - cron: '0 12 * * 5'
  workflow_dispatch: # 支持手动触发测试

permissions:
  contents: write

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Digest Generator
        env:
          # AI 模型配置（兼容所有 OpenAI 接口）
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          AI_MODEL: ${{ vars.AI_MODEL || 'gpt-4o-mini' }}
          
          # 搜索关键词（逗号分隔）
          KEYWORDS: ${{ vars.KEYWORDS || 'LLM, AI Agent, Computer Vision' }}
          
          # 邮件推送配置（可选）
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          
          # 社交平台 Webhook（可选，如 Discord/飞书/钉钉）
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python main.py

      - name: Set up Node (digest viewer → GitHub Pages)
        if: success()
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: digest-viewer/package-lock.json

      - name: Build digest viewer
        if: success()
        working-directory: digest-viewer
        env:
          DIGEST_DEDUPE_LINK: ${{ vars.DIGEST_DEDUPE_LINK || '1' }}
        run: npm ci && npm run build

      - name: Publish site to gh-pages
        if: success() && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./digest-viewer/dist
          force_orphan: true