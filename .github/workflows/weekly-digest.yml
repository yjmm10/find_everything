name: 📅 Weekly Tech Digest

# 分支职责（代码与展示分离）：
# - master：源码 + docs/ 周报 Markdown（数据层，默认分支）
# - gh-pages：仅 digest-viewer 构建产物（展示层，GitHub Pages 站点）
#
# GITHUB_TOKEN 的 push 不会触发其它 workflow，故本 job 内顺序为：
# 同步 master → 生成周报写入 docs/ → 提交 master → 构建 → 发布 gh-pages

on:
  schedule:
    # 每周五 12:00 UTC（北京时间 20:00）
    - cron: "0 12 * * 5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-digest-${{ github.repository }}
  cancel-in-progress: false

jobs:
  digest-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch (master)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Sync default branch before generate
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git pull --rebase origin "${{ github.event.repository.default_branch }}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Digest Generator (write docs only)
        env:
          DIGEST_NO_GIT: "1"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          AI_MODEL: ${{ vars.AI_MODEL || 'gpt-4o-mini' }}
          KEYWORDS: ${{ vars.KEYWORDS || 'LLM, AI Agent, Computer Vision' }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python main.py

      - name: Commit digest to master (docs/ only)
        run: |
          git add docs/
          if git diff --staged --quiet; then
            echo "No docs changes to commit"
          else
            git commit -m '📦 Auto-update weekly digest'
            git push origin "HEAD:${{ github.event.repository.default_branch }}"
          fi

      - name: Set up Node (build viewer from master)
        if: success()
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: digest-viewer/package-lock.json

      - name: Build digest viewer
        if: success()
        working-directory: digest-viewer
        env:
          DIGEST_DEDUPE_LINK: ${{ vars.DIGEST_DEDUPE_LINK || '0' }}
        run: npm ci && npm run build

      - name: Publish site to gh-pages (display only)
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./digest-viewer/dist
          force_orphan: true
