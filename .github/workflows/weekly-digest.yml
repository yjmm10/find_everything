name: 📅 Weekly Tech Digest

# 流程：
# 1. 使用最新 master 源码运行抓取（Python + digest-viewer 构建脚本）
# 2. 从 gh-pages 恢复历史 docs/，追加本次抓取结果
# 3. 构建前端，将 dist + docs/ 一并发布到 gh-pages（Pages 展示 + 数据归档）
# master 仅保留源码，不提交周报数据。

on:
  schedule:
    - cron: "0 12 * * 5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-digest-${{ github.repository }}
  cancel-in-progress: false

jobs:
  digest-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master (latest crawl code)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Sync master
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git pull --rebase origin "${{ github.event.repository.default_branch }}"

      - name: Restore digest archive from gh-pages
        run: bash .github/scripts/restore-docs-from-gh-pages.sh

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Digest Generator
        env:
          DIGEST_NO_GIT: "1"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          AI_MODEL: ${{ vars.AI_MODEL || 'gpt-4o-mini' }}
          KEYWORDS: ${{ vars.KEYWORDS || 'LLM, AI Agent, Computer Vision' }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          OPENALEX_API_KEY: ${{ secrets.OPENALEX_API_KEY }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python main.py

      - name: Set up Node
        if: success()
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: digest-viewer/package-lock.json

      - name: Build digest viewer
        if: success()
        working-directory: digest-viewer
        env:
          VITE_BASE: /find_everything/
          DIGEST_DEDUPE_LINK: ${{ vars.DIGEST_DEDUPE_LINK || '0' }}
        run: npm ci && npm run build

      - name: Prepare gh-pages bundle (site + docs archive)
        if: success()
        run: bash .github/scripts/prepare-gh-pages-deploy.sh

      - name: Publish to gh-pages
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./deploy
          force_orphan: true
