# 从 master 上的 docs/ 构建 digest-viewer，推送到 gh-pages（仅展示，不含源码）。
# 触发：master 上 docs/ 或 digest-viewer/ 变更；或手动 workflow_dispatch。
# 注意：weekly-digest 用 GITHUB_TOKEN push docs 不会触发本 workflow，定时任务已在 weekly-digest 内发布 gh-pages。

name: Digest viewer → GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - "docs/weekly-digest*.md"
      - "digest-viewer/**"
      - ".github/workflows/digest-site.yml"
  workflow_dispatch:

concurrency:
  group: digest-site-${{ github.repository }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: digest-viewer/package-lock.json

      - name: Install & build (master + docs/)
        working-directory: digest-viewer
        env:
          DIGEST_DEDUPE_LINK: ${{ vars.DIGEST_DEDUPE_LINK || '0' }}
        run: npm ci && npm run build

      - name: Publish to gh-pages (display only)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./digest-viewer/dist
          force_orphan: true
