# master 上前端/工作流变更时：用 master 代码 + gh-pages 上已有 docs/ 重新构建并发布站点。

name: Digest viewer → GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - "digest-viewer/**"
      - ".github/workflows/digest-site.yml"
      - ".github/scripts/**"
  workflow_dispatch:

concurrency:
  group: digest-site-${{ github.repository }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master (latest build code)
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - name: Restore digest archive from gh-pages
        run: bash .github/scripts/restore-docs-from-gh-pages.sh

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: digest-viewer/package-lock.json

      - name: Install & build
        working-directory: digest-viewer
        env:
          VITE_BASE: /find_everything/
          DIGEST_DEDUPE_LINK: ${{ vars.DIGEST_DEDUPE_LINK || '0' }}
        run: npm ci && npm run build

      - name: Prepare gh-pages bundle
        run: bash .github/scripts/prepare-gh-pages-deploy.sh

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./deploy
          force_orphan: true
